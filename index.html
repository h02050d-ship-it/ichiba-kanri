<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#059669">
<title>市場管理ボード｜林材木店</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23059669'/><text x='51' y='46.5' font-size='58' text-anchor='middle' dominant-baseline='central' fill='%23ffffff' font-family='sans-serif' font-weight='bold'>市</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23059669'/><text x='51' y='46.5' font-size='58' text-anchor='middle' dominant-baseline='central' fill='%23ffffff' font-family='sans-serif' font-weight='bold'>市</text></svg>">
<meta name="apple-mobile-web-app-title" content="市場管理ボード">
<style>
:root{
  --bg:#eef5f1; --card:#ffffff; --ink:#1f2e28; --sub:#78897f; --line:#dce8e2;
  --accent:#059669; --accent2:#047857; --danger:#d15a3c; --ok:#3d8a4f; --warn:#e08a1e; --info:#2f74c0;
  --chip:#e3efe9; --hl:#f0f7f3;
  --stale-ok:#3d8a4f; --stale-mid:#e08a1e; --stale-bad:#d15a3c;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:96px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px}

/* ===== ヘッダー ===== */
header{position:sticky;top:0;z-index:30;background:var(--accent);color:#fff;padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;box-shadow:0 2px 10px rgba(31,46,40,.18)}
header .hwrap{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:8px}
header .ttl{font-size:16px;font-weight:800;letter-spacing:.04em;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header .ttl small{display:block;font-size:10px;font-weight:600;opacity:.78;letter-spacing:.1em}
.hbtn{border:0;background:rgba(255,255,255,.14);color:#fff;border-radius:9px;padding:7px 10px;font-size:12px;font-weight:700;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.hbtn:active{background:rgba(255,255,255,.28)}
#srcBadge{border:0;background:rgba(0,0,0,.16);color:#d6f0e4;border-radius:99px;padding:5px 10px;font-size:10.5px;font-weight:700}
#srcBadge.err{color:#ffd9c9}

/* ===== API未接続バナー ===== */
#mockBanner{display:none;background:#fbeed6;color:#8a5a12;font-size:11.5px;font-weight:700;text-align:center;padding:7px 12px;line-height:1.5;border-bottom:1px solid #eeddb8}

/* ===== タブ ===== */
.tabs{position:sticky;top:calc(env(safe-area-inset-top) + 54px);z-index:25;display:flex;gap:6px;padding:10px 14px 8px;background:linear-gradient(var(--bg) 82%,rgba(238,245,241,0));max-width:1280px;margin:0 auto;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:0 0 auto;border:1.5px solid var(--line);background:var(--card);color:var(--sub);border-radius:12px;padding:9px 22px;font-size:13px;font-weight:800;white-space:nowrap}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
@media(max-width:760px){.tab{flex:1 0 auto;padding:9px 10px;font-size:12.5px}}

/* ===== 本文（PC基準・max 1280px） ===== */
main{padding:4px 14px 0;max-width:1280px;margin:0 auto}

/* ===== PCグリッド（スマホは自動で1カラム） ===== */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(360px,100%),1fr));gap:10px;align-items:stretch}
.mgrid .mcard{margin-bottom:0}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(420px,100%),1fr));gap:8px;align-items:stretch}
.rgrid .rrow,.rgrid .setrow{margin-bottom:0}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(480px,100%),1fr));gap:10px;align-items:start}
.vgrid .vcard{margin-bottom:0}
.det2col{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
@media(max-width:900px){.det2col{grid-template-columns:1fr}}
.sechead{font-size:12px;font-weight:800;color:var(--sub);letter-spacing:.06em;margin:16px 2px 8px;display:flex;align-items:center;gap:6px}
.sechead::after{content:"";flex:1;height:1px;background:var(--line)}

/* ===== 全社サマリー ===== */
.sumgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:4px}
.sumcard{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--cc,var(--accent));border-radius:14px;padding:12px 14px;box-shadow:0 1px 5px rgba(31,46,40,.06)}
.sumcard .th{font-size:12px;font-weight:800;color:var(--sub)}
.sumcard .val{font-size:24px;font-weight:900;line-height:1.15;margin:4px 0 2px;color:var(--cc,var(--accent))}
.sumcard .val small{font-size:13px;font-weight:800}
.sumcard .sub2{font-size:10.5px;color:var(--sub);font-weight:700}

/* ===== 市場カード ===== */
.mcard{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--cc,var(--accent));border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 5px rgba(31,46,40,.06);cursor:pointer}
.mcard .mtop{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.mcard .mname{font-size:14.5px;font-weight:800;flex:1;min-width:0}
.mcard .msales{font-size:18px;font-weight:900;margin-top:7px;color:var(--ink)}
.mcard .msales small{font-size:11px;font-weight:700;color:var(--sub);margin-left:4px}
.mcard .mnet{font-size:11.5px;color:var(--sub);font-weight:700;margin-top:2px}
.mcard .mstock{font-size:11.5px;color:var(--sub);font-weight:700;margin-top:6px}
.mcard .mstock b{color:var(--ink);font-size:13px}
.mcard .mbadges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

/* バッジ */
.badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--chip);color:var(--accent2)}
.badge.shoryu-itaku{background:#e6eef8;color:var(--info)}
.badge.shoryu-kaitori{background:#efe7f4;color:#7a4fb0}
.badge.shoryu-keiyaku{background:#f0ece2;color:#8a6d2f}
.badge.rate{background:#e7f4ec;color:var(--ok)}
.badge.wstale{background:#fbeed6;color:var(--warn)}
.badge.wlack{background:#f7e0d8;color:var(--danger)}
.badge.wcheck{background:#f7e0d8;color:var(--danger)}
.badge.gray{background:#e9edeb;color:#5f6f67}
.badge.stale-ok{background:#e7f4ec;color:var(--stale-ok)}
.badge.stale-mid{background:#fbeed6;color:var(--stale-mid)}
.badge.stale-bad{background:#f7e0d8;color:var(--stale-bad)}
.badge.wverify{background:#e6eef8;color:var(--info)}
.badge.westim{background:#f6ecd9;color:#a4762a}
.feemuted{font-size:10px;color:var(--sub);font-weight:700;align-self:center;white-space:nowrap}
.estnote{font-size:10px;color:var(--sub);font-weight:700}
table.stbl td.neg{color:var(--danger);font-weight:800}
.badge.unconf{background:#e6eef8;color:var(--info);padding:1px 6px}
.badge.confd{background:#e7f4ec;color:var(--ok)}

/* ===== 取込検証カード ===== */
.vcard{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--cc,var(--info));border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 5px rgba(31,46,40,.06)}
.vcard .v1{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.vcard .vmkt{font-size:13.5px;font-weight:800;flex:1;min-width:0}
.vcard .vdate{font-size:11px;color:var(--sub);font-weight:700}
.vcmp{display:flex;gap:8px;margin-top:9px;align-items:stretch}
.vcol{flex:1;background:var(--hl);border-radius:10px;padding:8px 10px;text-align:center}
.vcol .vl{font-size:10px;font-weight:800;color:var(--sub)}
.vcol .vv{font-size:14.5px;font-weight:900;margin-top:2px;font-variant-numeric:tabular-nums}
.vcol .vv small{font-size:10px;font-weight:700;color:var(--sub)}
.vmid{flex:0 0 auto;display:flex;align-items:center;font-size:15px;color:var(--sub)}
.vdiff{font-size:11px;font-weight:800;color:var(--warn);margin-top:7px;text-align:center}
.vmsg{font-size:11px;color:var(--sub);font-weight:700;margin-top:7px;line-height:1.6;word-break:break-all}
.vfoot{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.vbtn{border:1.5px solid var(--accent);color:var(--accent2);background:#fff;border-radius:10px;padding:9px 14px;font-size:12.5px;font-weight:800;flex:1}
.vbtn:disabled{opacity:.5}
.vpdf{font-size:12px;font-weight:800;color:var(--info);text-decoration:none;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px}

/* ===== 月別棒グラフ ===== */
.trend{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 14px 8px;box-shadow:0 1px 5px rgba(31,46,40,.06)}
.bars{display:flex;align-items:flex-end;gap:6px;height:130px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:0}
.barcol .pct{font-size:9.5px;font-weight:800;color:var(--ink);margin-bottom:3px;white-space:nowrap}
.barcol .bar{width:72%;max-width:34px;background:linear-gradient(var(--accent),var(--accent2));border-radius:6px 6px 0 0;min-height:3px;transition:height .3s}
.barcol.empty .bar{background:var(--line)}
.barcol .mo{font-size:9.5px;font-weight:700;color:var(--sub);margin-top:6px;white-space:nowrap}

/* ===== テーブル ===== */
.tblwrap{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 5px rgba(31,46,40,.06);overflow-x:auto;-webkit-overflow-scrolling:touch}
table.stbl{width:100%;border-collapse:collapse;font-size:12px;min-width:520px}
table.stbl th{background:var(--hl);color:var(--sub);font-weight:800;font-size:10.5px;padding:8px 8px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line)}
table.stbl td{padding:8px 8px;border-bottom:1px dashed var(--line);white-space:nowrap}
table.stbl tr:last-child td{border-bottom:0}
table.stbl tr.warn td{background:#fdf3e6}
table.stbl td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
.subtbl{width:100%;border-collapse:collapse;font-size:12.5px}
.subtbl th{background:var(--hl);color:var(--sub);font-weight:800;font-size:11px;padding:8px;text-align:center;border-bottom:1px solid var(--line)}
.subtbl td{padding:9px 8px;text-align:center;border-bottom:1px dashed var(--line);font-weight:700;font-variant-numeric:tabular-nums}
.subtbl td:first-child{text-align:left}

/* ===== 詳細ヘッダー ===== */
.dethead{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;box-shadow:0 1px 5px rgba(31,46,40,.06);margin-top:4px}
.dethead .dn{font-size:16px;font-weight:900}
.dethead .dm{font-size:11.5px;color:var(--sub);font-weight:700;margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.dethead .dm b{color:var(--ink)}

/* ===== 滞留/不足 行 ===== */
.rrow{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--cc,var(--accent));border-radius:12px;padding:10px 13px;margin-bottom:8px;box-shadow:0 1px 5px rgba(31,46,40,.06);display:flex;align-items:center;gap:11px}
.rrow .rinfo{flex:1;min-width:0}
.rrow .r1{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rrow .rmkt{font-size:11px;color:var(--sub);font-weight:800}
.rrow .rspec{font-size:13.5px;font-weight:800;margin-top:3px}
.rrow .r3{font-size:11px;color:var(--sub);font-weight:700;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.rrow .r3 b{color:var(--ink)}
.rrow .rbig{flex:0 0 auto;text-align:right}
.rrow .rbig .bn{font-size:20px;font-weight:900;line-height:1.1}
.rrow .rbig .bl{font-size:10px;color:var(--sub);font-weight:700}

/* ===== フィルタチップ ===== */
.pchips{display:flex;gap:6px;flex-wrap:wrap;margin:6px 2px 8px}
.pchip{border:1.5px solid var(--line);background:var(--card);color:var(--sub);border-radius:99px;padding:7px 14px;font-size:12.5px;font-weight:800}
.pchip.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ===== 設定リスト ===== */
.setrow{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;box-shadow:0 1px 5px rgba(31,46,40,.06);display:flex;align-items:center;gap:10px}
.setrow .si{flex:1;min-width:0}
.setrow .s1{font-size:13.5px;font-weight:800}
.setrow .s2{font-size:11px;color:var(--sub);font-weight:700;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.setrow .s2 b{color:var(--ink)}
.setrow .sedit{flex:0 0 auto;border:1.5px solid var(--accent);color:var(--accent2);background:#fff;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:800}
.linkbtn{display:block;text-align:center;border:1.5px solid var(--line);background:var(--card);color:var(--accent2);border-radius:12px;padding:12px;font-size:13px;font-weight:800;text-decoration:none;margin-top:8px}

.empty{text-align:center;color:var(--sub);padding:52px 0;font-size:13px;line-height:2}
.empty .big{font-size:34px}

/* ===== FAB ===== */
#fab{position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 18px);z-index:40;border:0;border-radius:99px;background:var(--accent);color:#fff;font-size:15px;font-weight:800;padding:15px 22px;box-shadow:0 6px 18px rgba(4,120,87,.4);display:none;align-items:center;gap:7px}
#fab:active{transform:scale(.96)}

/* ===== モーダル ===== */
.mwrap{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;background:rgba(31,46,40,.45)}
.mwrap.show{display:flex}
.modal{background:var(--card);width:100%;max-width:640px;max-height:90vh;border-radius:20px 20px 0 0;display:flex;flex-direction:column;animation:up .18s ease}
@media(min-width:700px){.mwrap{align-items:center}.modal{border-radius:20px}}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.mhead{display:flex;align-items:center;padding:16px 18px 10px}
.mhead h2{font-size:16px;font-weight:800;flex:1}
.mx{border:0;background:var(--chip);border-radius:99px;width:32px;height:32px;font-size:14px;color:var(--sub)}
.mbody{overflow-y:auto;padding:2px 18px 18px;-webkit-overflow-scrolling:touch}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:12px;font-weight:800;color:var(--sub);margin-bottom:5px}
.fld label em{color:var(--danger);font-style:normal;margin-left:2px}
.fld input[type=text],.fld input[type=number],.fld input[type=date],.fld select,.fld textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:11px;background:#fff;outline:none}
.fld textarea{min-height:52px;resize:vertical;line-height:1.5}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--accent)}
.row2{display:flex;gap:10px}
.row2>.fld{flex:1}
.row3{display:flex;gap:8px}
.row3>.fld{flex:1}
.chkrow{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:13px}
.chkrow input{width:18px;height:18px;accent-color:var(--accent)}
.merr{color:var(--danger);font-size:12px;font-weight:700;text-align:center;min-height:18px;padding-top:6px}
.msave{width:100%;border:0;border-radius:13px;background:var(--accent);color:#fff;font-size:15px;font-weight:800;padding:14px 0;margin-top:4px}
.msave:disabled{opacity:.5}
.mdel{width:100%;border:1.5px solid #e8cfc3;background:#fff;border-radius:13px;color:var(--danger);font-size:13px;font-weight:800;padding:12px 0;margin-top:10px}

/* ===== ログインゲート ===== */
#gate{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;align-items:center;justify-content:center;padding:22px}
.gcard{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:30px 24px;width:100%;max-width:360px;box-shadow:0 10px 40px rgba(31,46,40,.12);text-align:center}
.gcard .logo{font-size:40px}
.gcard h1{font-size:17px;font-weight:800;margin:8px 0 2px}
.gcard p{font-size:11.5px;color:var(--sub);margin-bottom:18px}
.gcard input{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:10px;outline:none;background:#fff}
.gcard input:focus{border-color:var(--accent)}
.pwrow{position:relative}
.pwrow button{position:absolute;right:4px;top:4px;border:0;background:none;font-size:15px;padding:8px}
.gkeep{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--sub);margin:4px 0 14px}
.gkeep input{width:16px;height:16px;accent-color:var(--accent)}
#gateBtn{width:100%;border:0;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:800;padding:13px 0}
#gateErr{color:var(--danger);font-size:12px;font-weight:700;min-height:18px;margin-top:10px}

/* ===== トースト ===== */
#toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 86px);transform:translateX(-50%) translateY(20px);z-index:80;background:var(--ink);color:#fff;font-size:13px;font-weight:700;padding:11px 20px;border-radius:99px;opacity:0;pointer-events:none;transition:.25s;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%)}
.spin{display:inline-block;width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="hwrap">
    <div class="ttl">🏬 市場管理ボード<small>HAYASHI LUMBER — 市場・在庫・売上</small></div>
    <button id="srcBadge">…</button>
    <a class="hbtn" id="sheetBtn" target="_blank" style="display:none">📊</a>
  </div>
</header>
<div id="mockBanner">⚠ API未接続（サンプルデータ表示中）</div>

<div class="tabs">
  <button class="tab on" data-tab="summary">🏬 市場一覧</button>
  <button class="tab" data-tab="detail">🔎 市場詳細</button>
  <button class="tab" data-tab="ritai">⏳ 滞留</button>
  <button class="tab" data-tab="shortage">⚠ 不足</button>
  <button class="tab" data-tab="settings">⚙ 設定･検証</button>
</div>

<main id="list"></main>

<button id="fab">＋ 追加</button>

<!-- 必要数量 追加・編集 -->
<div class="mwrap" id="shWrap">
  <div class="modal">
    <div class="mhead"><h2 id="shTitle">必要数量を追加</h2><button class="mx" data-close="shWrap">✕</button></div>
    <div class="mbody">
      <div class="fld"><label>対象市場</label><input type="text" id="shMarket" list="marketList" placeholder="例：丸宇木材市売（株）北浜市場"><datalist id="marketList"></datalist></div>
      <div class="row2">
        <div class="fld"><label>品名<em>*</em></label><input type="text" id="shProduct" list="prodList" placeholder="桧フローリング"><datalist id="prodList"><option value="桧フローリング"><option value="桧羽目板"><option value="桧スノコ板"></datalist></div>
        <div class="fld"><label>等級</label><input type="text" id="shGrade" list="gradeList" placeholder="丸節"><datalist id="gradeList"><option value="丸節"><option value="生節"><option value="小節"><option value="特上小"><option value="無節"><option value="無節特上小"></datalist></div>
      </div>
      <div class="row3">
        <div class="fld"><label>厚mm</label><input type="number" id="shThick" inputmode="numeric" placeholder="15"></div>
        <div class="fld"><label>巾mm</label><input type="number" id="shWidth" inputmode="numeric" placeholder="120"></div>
        <div class="fld"><label>長さmm</label><input type="number" id="shLength" inputmode="numeric" placeholder="4000"></div>
      </div>
      <div class="fld"><label>必要束数<em>*</em></label><input type="number" id="shNeed" min="0" inputmode="numeric" placeholder="例：50"></div>

<div id="toast"></div>

<script>
/* ===== 接続設定 ===== */
const GAS_URL='https://script.google.com/macros/s/AKfycbzdr8jQQKW1dqqGKd1ZtIgUgrlLgoe53-lyXdrIkCAORI23-BMU_6pWy9WyZZaHKQ5Tjw/exec';   /* ← オーケストレーターが exec URL に差し替える（この行） */
const CRED_KEY="hayazai_ichiba_cred";
const CACHE_KEY="hayazai_ichiba_cache";
const USE_MOCK = (GAS_URL==='__GAS_URL__' || !/^https?:/.test(GAS_URL));

/* ===== 状態 ===== */
let MARKETS=[], SALES=[], STOCK=[], STOCKBYMARKET=[], RITAI=[], SHORTAGE=[], NAITO={updated:"",rows:[]}, DICT=[], INGESTLOG=[], ESTIMATED=[], ANCHORS=[];
let SHEET_URL="", TODAY="", FYSTART="";
let TAB="summary";
let curMarket="";        // 詳細タブの選択市場
let ritaiFilter="0.5";   // 0.5 | 3 | 6（半年未満は常に対象外）
let editShId=null, editStId=null, editMkKey=null;

/* ===== 資格情報（共通SSO） ===== */
const SSO_KEY="hayazai_sso_cred";
const SSO_PEERS=["hayazai_ichiba_cred","hayazai_board_cred","hayazai_seiso_cred","hayazai_rulebook_cred","hayazai_kaizen_cred","notify_creds_v1","seinodesk_cred","faxdesk_cred","orderdesk_cred","nippou_cred"];
function ssoFind_(){
  const keys=[SSO_KEY].concat(SSO_PEERS);
  for(const k of keys){
    try{ const v=JSON.parse(localStorage.getItem(k)||"null");
      if(v){ const email=v.email||v.e, pass=v.pass||v.p; if(email&&pass) return {email:String(email),pass:String(pass)}; }
    }catch(e){}
  }
  return null;
}
function ssoWrite(email,pass){ try{ localStorage.setItem(SSO_KEY,JSON.stringify({email:email,pass:pass})); }catch(e){} }
function ssoClear(){ try{ localStorage.removeItem(SSO_KEY); }catch(e){} }
function creds(){
  try{ const v=JSON.parse(localStorage.getItem(CRED_KEY)||sessionStorage.getItem(CRED_KEY)||"null"); if(v&&v.email&&v.pass) return v; }catch(e){}
  const s=ssoFind_(); if(s){ try{ localStorage.setItem(CRED_KEY,JSON.stringify(s)); }catch(e){} return s; }
  return {};
}
function saveCreds(email,pass,keep){ const v=JSON.stringify({email,pass}); if(keep){ localStorage.setItem(CRED_KEY,v); sessionStorage.removeItem(CRED_KEY); } else { sessionStorage.setItem(CRED_KEY,v); localStorage.removeItem(CRED_KEY); } ssoWrite(email,pass); }
function clearCreds(){ localStorage.removeItem(CRED_KEY); sessionStorage.removeItem(CRED_KEY); localStorage.removeItem(CACHE_KEY); ssoClear(); }
function authQS(){ const c=creds(); return "email="+encodeURIComponent(c.email||"")+"&pass="+encodeURIComponent(c.pass||""); }

/* ===== ユーティリティ ===== */
const $=id=>document.getElementById(id);
function esc(s){ return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function b64utf8(s){ const b=new TextEncoder().encode(s); let x=""; for(let i=0;i<b.length;i+=0x8000){ x+=String.fromCharCode.apply(null,b.subarray(i,i+0x8000)); } return btoa(x); }
function yen(n){ n=Number(n)||0; return n.toLocaleString("ja-JP"); }
function num(n){ return (Number(n)||0).toLocaleString("ja-JP"); }
let toastTimer=null;
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2400); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtDate(s){ if(!s) return ""; const p=String(s).split("-"); if(p.length<3) return String(s); return (+p[1])+"/"+(+p[2]); }
function sizeLabel(o){
  const p=[]; if(o.thickness) p.push(o.thickness+"t"); if(o.width) p.push(o.width+"w"); if(o.length) p.push((Number(o.length)>=1000?(Number(o.length)/1000)+"m":o.length));
  return p.join("×");
}

/* ===== 滞留年数バッジ ===== */
function staleClass(y){ y=Number(y)||0; if(y>=6) return "stale-bad"; if(y>=3) return "stale-mid"; return "stale-ok"; }
function staleBadge(years,approx){
  if(years==null||years==="") return "";
  if(Number(years)<0.5) return "";   /* 半年未満は滞留扱いしない */
  const y=Math.floor(Number(years)*10)/10;
  const cls=staleClass(y);
  return `<span class="badge ${cls}">${approx?"≈":""}${y}年</span>`;
}

function fmtRatePct(v){ v=Number(v)||0; return (Math.round(v*100)/100).toString(); }

/* ===== 商流バッジ ===== */
function shoryuBadge(s){
  const cls=s==="委託"?"shoryu-itaku":s==="買取"?"shoryu-kaitori":s==="契約型"?"shoryu-keiyaku":"gray";
  return `<span class="badge ${cls}">${esc(s||"—")}</span>`;
}
function shoryuColor(s){ return s==="委託"?"var(--info)":s==="買取"?"#7a4fb0":s==="契約型"?"#8a6d2f":"var(--accent)"; }

/* ===== 起動 ===== */
function boot(){
  if(USE_MOCK){ $("mockBanner").style.display="block"; }
  const c=creds();
  if(USE_MOCK){
    // モックは「API未接続」明示時のみ・認証ゲートは通す（デモ用に自動サンプル投入）
    $("gate").style.display="none";
    loadMock(); setBadge("mock"); render(); return;
  }
  if(c.email&&c.pass){
    $("gate").style.display="none";
    const cache=loadCache();
    if(cache){ applyData(cache); render(); }
    else showLoadingList();
    fetchAll();
  } else showGate();
}
function showGate(err){ $("gate").style.display="flex"; $("gateErr").textContent=err||""; setTimeout(()=>$("gateMail").focus(),60); }
$("pwEye").onclick=()=>{ const i=$("gatePass"); const s=i.type==="password"; i.type=s?"text":"password"; $("pwEye").textContent=s?"🙈":"👁"; };
["gateMail","gatePass"].forEach(id=>$(id).addEventListener("keydown",e=>{ if(e.key==="Enter") submitGate(); }));
$("gateBtn").onclick=submitGate;
function submitGate(){
  const email=$("gateMail").value.trim(), pass=$("gatePass").value;
  if(!email||!pass) return;
  saveCreds(email,pass,$("gateKeep").checked);
  $("gate").style.display="none";
  showLoadingList();
  fetchAll();
}
$("srcBadge").onclick=()=>{ if(confirm("ログアウトしますか？")){ clearCreds(); location.reload(); } };

function showLoadingList(){ $("list").innerHTML='<div class="empty"><div class="spin"></div>読み込み中…<br><span style="font-size:10.5px">初回は20秒ほどかかることがあります</span></div>'; }
function setBadge(state){ const b=$("srcBadge"); if(state==="live"){ b.className=""; b.textContent="● ライブ"; } else if(state==="load"){ b.className=""; b.textContent="● 読込中…"; } else if(state==="mock"){ b.className="err"; b.textContent="● サンプル"; } else { b.className="err"; b.textContent="● オフライン"; } }

/* ===== データ適用 ===== */
function applyData(j){
  MARKETS=j.markets||[]; SALES=j.sales||[]; STOCK=j.stock||[]; STOCKBYMARKET=j.stockByMarket||[];
  RITAI=j.ritai||[]; SHORTAGE=j.shortage||[]; NAITO=j.naito||{updated:"",rows:[]}; DICT=j.dict||[]; INGESTLOG=j.ingestLog||[];
  ESTIMATED=j.estimated||[]; ANCHORS=j.anchors||[];
  SHEET_URL=j.sheetUrl||""; TODAY=j.today||todayStr(); FYSTART=j.fyStart||"";
}

/* ===== データ取得 ===== */
async function fetchOnce(url,ms){
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),ms);
  try{ const r=await fetch(url,{signal:ctrl.signal}); const t=await r.text(); if(!t||t.trim()[0]!=="{") throw new Error("bad response"); return JSON.parse(t); }
  finally{ clearTimeout(to); }
}
async function fetchAll(){
  if(USE_MOCK){ loadMock(); setBadge("mock"); render(); return; }
  setBadge("load");
  let j=null;
  for(let i=0;i<3&&!j;i++){ try{ j=await fetchOnce(GAS_URL+"?api=all&"+authQS(), i===0?25000:12000); }catch(e){ j=null; } }
  if(!j){ setBadge("err"); if(!MARKETS.length) $("list").innerHTML='<div class="empty"><div class="big">📡</div>読み込みに失敗しました<br><button class="pchip" style="margin-top:14px" onclick="fetchAll()">再読み込み</button></div>'; return; }
  if(!j.ok){ if(j.error==="unauthorized"){ clearCreds(); showGate("メールまたはパスワードが違います"); } else { setBadge("err"); toast("エラー: "+(j.error||"不明")); } return; }
  applyData(j);
  try{ localStorage.setItem(CACHE_KEY,JSON.stringify(j)); }catch(e){}
  const sb=$("sheetBtn"); if(SHEET_URL){ sb.href=SHEET_URL; sb.style.display=""; }
  setBadge("live"); render();
}
function loadCache(){ try{ const s=localStorage.getItem(CACHE_KEY); return s?JSON.parse(s):null; }catch(e){ return null; } }

async function postAction(payload){
  if(USE_MOCK){ toast("サンプル表示中：保存はGAS接続後に有効です"); return {ok:false,error:"mock"}; }
  const c=creds();
  const body=b64utf8(JSON.stringify({...payload,email:c.email,pass:c.pass}));
  const r=await fetch(GAS_URL,{method:"POST",body:body});
  const t=await r.text();
  if(!t||t.trim()[0]!=="{") throw new Error("bad response");
  return JSON.parse(t);
}

/* ===== タブ ===== */
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{ TAB=b.dataset.tab; document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x===b)); render(); });

/* ===== 集計ヘルパ ===== */
function salesOf(market){ return SALES.find(s=>s.market===market)||null; }
function stockByOf(market){ return STOCKBYMARKET.find(s=>s.market===market)||null; }
function marketOf(name){ return MARKETS.find(m=>m.market===name)||null; }
function activeMarkets(){ return MARKETS.filter(m=>m.active!==false); }
function staleBundlesOf(market){ // 半年以上の束数合計
  let b=0; RITAI.forEach(r=>{ if(r.market===market && (Number(r.years)||0)>=0.5) b+=Number(r.bundles)||0; }); return b;
}
function isDirectMarket(name){ const m=marketOf(name); return !!(m&&m.stockMethod==="直接"); }
function estimatedOf(market){ return ESTIMATED.find(e=>e.market===market)||null; }
function isJudgable(market){ return isDirectMarket(market)||!!estimatedOf(market); }  /* 不足判定に使える市場 */
function lackSpecsOf(market){ if(!isJudgable(market)) return 0; return SHORTAGE.filter(s=>s.market===market && (Number(s.lack)||0)>0).length; }
function checkWarnOf(market){ const sb=stockByOf(market); return sb&&sb.checkWarn; }
function hasUnverified(market){ return STOCK.some(r=>r.market===market && !r.confirmed); }
/* GAS側のキー表記ゆれ吸収（camel / snake 両対応） */
function lgv(r,camel,snake){ const v=r[camel]; return (v===undefined||v===null||v==="")?r[snake]:v; }
function batchStockRows(batchId){ if(!batchId) return []; return STOCK.filter(r=>String(lgv(r,"batchId","batch_id")||"")===String(batchId)); }

/* ===== 描画 ===== */
function render(){
  $("fab").style.display="none";
  if(TAB==="summary") renderSummary();
  else if(TAB==="detail") renderDetail();
  else if(TAB==="ritai") renderRitai();
  else if(TAB==="shortage") renderShortage();
  else if(TAB==="settings") renderSettings();
}

/* ===== 画面① 市場サマリー一覧 ===== */
function renderSummary(){
  const mks=activeMarkets();
  if(!mks.length){ $("list").innerHTML='<div class="empty"><div class="big">🏬</div>市場マスタが未登録です<br>設定タブから市場を追加してください</div>'; return; }
  // 全社サマリー
  let totSales=0, totNet=0, totBundles=0, totStale=0;
  SALES.forEach(s=>{ totSales+=Number(s.fySales)||0; totNet+=Number(s.fyNet)||0; });
  STOCKBYMARKET.forEach(s=>{ totBundles+=Number(s.bundles)||0; });
  RITAI.forEach(r=>{ if((Number(r.years)||0)>=3) totStale+=Number(r.bundles)||0; });

  let html='<div class="sechead">📊 全社サマリー（今期）</div><div class="sumgrid">';
  html+=`<div class="sumcard" style="--cc:var(--accent)"><div class="th">今期売上</div><div class="val">¥${yen(totSales)}</div><div class="sub2">手取り ¥${yen(totNet)}</div></div>`;
  html+=`<div class="sumcard" style="--cc:var(--info)"><div class="th">在庫総束数</div><div class="val">${num(totBundles)}<small>束</small></div><div class="sub2">${mks.length}市場</div></div>`;
  html+=`<div class="sumcard" style="--cc:var(--warn)"><div class="th">滞留（3年+）</div><div class="val">${num(totStale)}<small>束</small></div><div class="sub2">要資金化</div></div>`;
  html+='</div>';

  // カード（売上降順・PCは2〜3カラムグリッド）
  const sorted=mks.slice().sort((a,b)=>{ const sa=salesOf(a.market), sb=salesOf(b.market); return (sb?Number(sb.fySales)||0:0)-(sa?Number(sa.fySales)||0:0); });
  html+='<div class="sechead">🏬 市場一覧（売上降順）</div><div class="mgrid">';
  sorted.forEach(m=>{
    const s=salesOf(m.market), sb=stockByOf(m.market);
    const cc=shoryuColor(m.shoryu);
    const fee=s?s.feeRateShown:"—";
    const bundles=sb?Number(sb.bundles)||0:(Number(m.latestSnapBundles)||0);
    const snap=(sb&&sb.latestSnapDate)||m.latestSnapDate||"";
    const stale=staleBundlesOf(m.market);
    const lackN=lackSpecsOf(m.market);
    const chkWarn=checkWarnOf(m.market);
    const estE=estimatedOf(m.market);
    const isEst=!!estE||(sb&&sb.estimated===true);
    const estBundles=estE?Number(estE.totalEst)||0:(sb?Number(sb.bundles)||0:0);
    const noAnchor=!isEst&&(m.stockMethod==="推定"||m.stockMethod==="積み上げ"||m.stockMethod==="要確認");
    const reqConfirm=(m.stockMethod==="要確認");
    let badges='';
    badges+=shoryuBadge(m.shoryu);
    if(fee&&fee!=="—"&&fee!=="契約型") badges+=`<span class="badge rate">手数料 ${esc(fee)}</span>`;
    if(m.shoryu==="契約型"&&s&&s.feeRateActual!=null&&isFinite(Number(s.feeRateActual))) badges+=`<span class="feemuted">契約型・実測${fmtRatePct(s.feeRateActual)}%</span>`;
    if(stale>0) badges+=`<span class="badge wstale">⏳ 滞留${num(stale)}束</span>`;
    if(lackN>0) badges+=`<span class="badge wlack">⚠ 不足${lackN}規格</span>`;
    if(chkWarn) badges+=`<span class="badge wcheck">⚠ 要確認</span>`;
    if(hasUnverified(m.market)) badges+=`<span class="badge wverify">🔍 要検証</span>`;
    html+=`<div class="mcard" style="--cc:${cc}" onclick="openDetail('${esc(m.market)}')">
      <div class="mtop"><span class="mname">${esc(m.market)}</span></div>
      <div class="msales">¥${yen(s?s.fySales:0)}<small>今期売上</small></div>
      <div class="mnet">手取り ¥${yen(s?s.fyNet:0)}</div>
      <div class="mstock">${
        isEst
        ? `在庫 <b>${num(estBundles)}</b>束 <span class="badge westim" title="棚卸しアンカー＋搬入−販売による推定値">⚠推定</span>${estE&&estE.anchorDate?`　<span class="estnote">アンカー ${esc(fmtDate(estE.anchorDate))}</span>`:""}`
        : noAnchor
          ? `在庫: <span style="color:var(--sub)">要確認</span>　<span class="estnote" title="設定タブの棚卸しアンカーを登録すると推定在庫が出ます">（棚卸しアンカー未設定）</span>`
          : `${reqConfirm?'在庫: <span style="color:var(--sub)">要確認</span>':`在庫 <b>${num(bundles)}</b>束`}${snap?`　<span style="color:var(--sub)">最新 ${esc(fmtDate(snap))}</span>`:""}`
      }</div>
      <div class="mbadges">${badges}</div>
    </div>`;
  });
  html+='</div>';
  $("list").innerHTML=html;
}

/* ===== 取込検証ビュー（設定タブ上部） ===== */
function fmtVol(v){ if(v===undefined||v===null||v===""||isNaN(Number(v))) return "—"; return Number(v).toFixed(2); }
function verifyHtml(){
  let html='<div class="sechead">✅ 取込検証（書類 ⇔ AI読取）</div>';
  if(!INGESTLOG.length){
    html+='<div class="trend" style="text-align:center;color:var(--sub);font-size:12px;padding:18px 0">取込ログはまだありません</div>';
    return html;
  }
  const logs=INGESTLOG.slice().sort((a,b)=>String(b.ts||"").localeCompare(String(a.ts||"")));
  html+='<div class="vgrid">';
  logs.forEach(l=>{
    const mkt=marketOf(l.market);
    const df=(mkt&&mkt.driveFolder)||"";
    const batchId=lgv(l,"batchId","batch_id")||"";
    const snap=lgv(l,"snapshotDate","snapshot_date")||"";
    const docB=lgv(l,"docBundles","doc_bundles"), docV=lgv(l,"docVolume","doc_volume");
    const readB=lgv(l,"readBundles","read_bundles"), readV=lgv(l,"readVolume","read_volume");
    const srcPdf=lgv(l,"srcPdf","src_pdf")||"";
    const hasDoc=(docB!==undefined&&docB!==null&&docB!=="");
    const bMatch=hasDoc && Number(docB)===Number(readB);
    const vMatch=hasDoc && Math.abs((Number(docV)||0)-(Number(readV)||0))<0.005;
    const match=hasDoc && bMatch && vMatch;
    const rows=batchStockRows(batchId);
    const allConfirmed=rows.length>0 && rows.every(r=>!!r.confirmed);
    const cc=match?"var(--ok)":(hasDoc?"var(--warn)":"var(--sub)");
    let diffTxt="";
    if(hasDoc && !match){
      const db=(Number(readB)||0)-(Number(docB)||0);
      const dv=(Number(readV)||0)-(Number(docV)||0);
      const parts=[];
      if(!bMatch) parts.push("束数差 "+(db>0?"+":"")+num(db)+"束");
      if(!vMatch) parts.push("材積差 "+(dv>0?"+":"")+dv.toFixed(2)+"㎥");
      diffTxt=`<div class="vdiff">⚠ 不一致: ${parts.join(" / ")}</div>`;
    }
    html+=`<div class="vcard" style="--cc:${cc}">
      <div class="v1"><span class="vmkt">${esc(l.market||"")}</span>
        ${match?'<span class="badge stale-ok">✓ 一致</span>':(hasDoc?'<span class="badge wstale">⚠ 不一致</span>':'<span class="badge gray">書類合計なし</span>')}
        ${l.status==="warn"?'<span class="badge wstale">warn</span>':""}
        ${allConfirmed?'<span class="badge confd">確認済み</span>':""}
      </div>
      <div class="vdate" style="margin-top:4px">スナップ ${esc(snap)}${l.ts?"　取込 "+esc(String(l.ts)):""}${batchId?"　#"+esc(batchId):""}</div>
      <div class="vcmp">
        <div class="vcol"><div class="vl">📄 書類の合計欄</div><div class="vv">${hasDoc?num(docB):"—"}<small>束</small> / ${fmtVol(docV)}<small>㎥</small></div></div>
        <div class="vmid">⇔</div>
        <div class="vcol"><div class="vl">🤖 AI読取の合計</div><div class="vv">${num(readB!==undefined&&readB!==null&&readB!==""?readB:l.bundles)}<small>束</small> / ${fmtVol(readV!==undefined&&readV!==null&&readV!==""?readV:lgv(l,"volume","volume_m3"))}<small>㎥</small></div></div>
      </div>
      ${diffTxt}
      ${l.message?`<div class="vmsg">💬 ${esc(l.message)}</div>`:""}
      <div class="vfoot">
        ${allConfirmed
          ? '<span style="font-size:12px;font-weight:800;color:var(--ok);flex:1;text-align:center">✔ この取込の在庫は確認済みです</span>'
          : (rows.length
              ? `<button class="vbtn" onclick="confirmBatch('${esc(batchId)}')">✔ この取込を確認済みにする（${rows.length}行）</button>`
              : '<span style="font-size:11px;font-weight:700;color:var(--sub);flex:1;text-align:center">対象在庫行なし（新しい取込で置換済みの可能性）</span>')}
        ${srcPdf?(/^https?:/.test(srcPdf)?`<a class="vpdf" href="${esc(srcPdf)}" target="_blank">📄 元PDF</a>`:`<span class="vpdf" style="border-style:dashed">📄 ${esc(srcPdf)}</span>`):""}
        ${df?`<a class="vpdf" href="${esc(df)}" target="_blank">📁 フォルダ</a>`:""}
      </div>
    </div>`;
  });
  html+='</div>';
  return html;
}
async function confirmBatch(batchId){
  if(!batchId){ toast("バッチIDがありません"); return; }
  if(!confirm("この取込バッチの在庫明細をすべて「確認済み」にしますか？")) return;
  try{
    const j=await postAction({action:"confirmBatch",batchId});
    if(!j.ok) throw new Error(j.error||"更新できませんでした");
    toast("確認済みにしました");
    await fetchAll();
  }catch(e){ toast("エラー: "+e.message); }
}
